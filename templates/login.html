<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – GAEB → Easyjob</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { background: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

    .login-header {
      background: #1565c0; color: #fff; width: 100%;
      text-align: center; padding: 14px 0; font-size: 1.1rem; font-weight: 600;
      position: fixed; top: 0; left: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }

    .login-card {
      background: #fff; border-radius: 8px; box-shadow: 0 4px 18px rgba(0,0,0,.12);
      padding: 32px 36px; width: 360px; max-width: 96vw;
    }

    .login-card h2 { font-size: 1rem; font-weight: 700; color: #1565c0; margin-bottom: 20px; }

    .error-box {
      background: #fdecea; border: 1px solid #f44336; border-radius: 4px;
      color: #b71c1c; font-size: .82rem; padding: 8px 12px; margin-bottom: 16px;
    }

    .field-row { margin-bottom: 10px; }
    .field-row label { display: block; font-size: .8rem; font-weight: 500; color: #444; margin-bottom: 3px; }
    .field-row input { width: 100%; }

    .login-btn {
      width: 100%; margin-top: 18px; padding: 9px; font-size: .95rem;
      background: #1565c0; color: #fff; border: none; border-radius: 5px;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .login-btn:hover { background: #1976d2; }
    .login-btn:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <div class="login-header">GAEB → Easyjob Import</div>

  <div class="login-card" style="margin-top:48px">
    <h2>Anmelden</h2>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" id="login-form">
      <div class="field-row">
        <label>Benutzer</label>
        <input type="text" name="ej_user" placeholder="Benutzer" required autofocus>
      </div>
      <div class="field-row">
        <label>Passwort</label>
        <input type="password" name="ej_pass" placeholder="Passwort" required>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Anmelden</button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function() {
      var btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Verbinde …';
    });
  </script>
</body>
</html>
